<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월드공인중개사사무소</title>
    <meta name="google-adsense-account" content="ca-pub-7488875668024322">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7488875668024322" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>월드공인중개사</h1>
        <p>경기 성남시 분당구 야탑동 381-14</p>
    </header>

    <div class="container">
        <!-- 사무소 정보 카드 -->
        <div class="card">
            <h2>연락처 정보</h2>
            <div class="info-item"><span class="info-label">주소</span><span>야탑동 381-14</span></div>
            <div class="info-item"><span class="info-label">일반전화</span><span>031-701-3600</span></div>
            <div class="info-item"><span class="info-label">휴대폰</span><span>010-4882-3601</span></div>
            <div class="btn-group">
                <a href="tel:031-701-3600" class="btn btn-call">사무실 연결</a>
                <a href="tel:010-4882-3601" class="btn btn-primary">담당자 직통</a>
            </div>
        </div>

        <!-- 댓글(방문후기) 카드 -->
        <div class="card">
            <h2>방문후기 & 문의</h2>
            
            <!-- 댓글 입력 폼 -->
            <div id="comment-form">
                <input type="text" id="nickname-input" placeholder="닉네임" maxlength="10">
                <textarea id="comment-input" placeholder="문의사항이나 방문 후기를 남겨주세요." rows="3"></textarea>
                <button onclick="addComment()" class="btn btn-primary">댓글 등록</button>
            </div>

            <!-- 댓글 리스트 -->
            <ul id="comment-list" class="comment-list">
                <!-- 댓글이 여기에 동적으로 추가됩니다 -->
            </ul>
        </div>
    </div>

    <footer>
        <p>&copy; 월드공인중개사사무소</p>
    </footer>

    <script>
        // 페이지 로드 시 댓글 불러오기
        document.addEventListener('DOMContentLoaded', loadComments);

        function addComment() {
            const nickname = document.getElementById('nickname-input').value;
            const content = document.getElementById('comment-input').value;
            const date = new Date().toLocaleDateString();

            if (!nickname || !content) {
                alert("이름과 내용을 모두 입력해주세요.");
                return;
            }

            const comment = {
                id: Date.now(),
                nickname: nickname,
                content: content,
                date: date
            };

            let comments = JSON.parse(localStorage.getItem('world_comments') || '[]');
            comments.unshift(comment); // 최신글이 위로
            localStorage.setItem('world_comments', JSON.stringify(comments));

            // 입력창 비우기
            document.getElementById('nickname-input').value = '';
            document.getElementById('comment-input').value = '';

            renderComments();
        }

        function deleteComment(id) {
            if(confirm("댓글을 삭제하시겠습니까?")) {
                let comments = JSON.parse(localStorage.getItem('world_comments') || '[]');
                comments = comments.filter(c => c.id !== id);
                localStorage.setItem('world_comments', JSON.stringify(comments));
                renderComments();
            }
        }

        function renderComments() {
            const list = document.getElementById('comment-list');
            const comments = JSON.parse(localStorage.getItem('world_comments') || '[]');
            
            list.innerHTML = comments.map(c => `
                <li class="comment-item">
                    <span class="comment-author">${c.nickname}</span>
                    <span class="comment-date">${c.date}</span>
                    <span class="comment-text">${c.content}</span>
                    <button class="delete-btn" onclick="deleteComment(${c.id})">삭제</button>
                </li>
            `).join('');
        }

        function loadComments() {
            renderComments();
        }
    </script>
</body>
</html>
